name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: user
          POSTGRES_PASSWORD: 4904
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # Java 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 권한
      - name: Grant execute permission
        run: chmod +x gradlew

      # 테스트
      - name: Run Integration Test
        run: ./gradlew integrationTest

      # DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Jar 빌드
      - name: Build Jar
        run: ./gradlew clean bootJar

      # 이미지 빌드 & 푸시
      - name: Build & Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce:${{ github.sha }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ecommerce:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce:latest

      # GitHub Actions IP 가져오기
      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      # AWS 인증
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # SSH 허용
      - name: Authorize IP
        run: |
          aws ec2 authorize-security-group-ingress \
          --group-name security_group \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32

      # SSH 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      # EC2 배포
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'

            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce:latest

            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d

          EOF

      # SSH 차단
      - name: Remove IP
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
          --group-name security_group \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32